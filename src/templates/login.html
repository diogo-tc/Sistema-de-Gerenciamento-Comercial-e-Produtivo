{% extends "base.html" %}

{% block title %}Login - Sistema de Gerenciamento{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center login-wrapper">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-2">Acesso do gerente</h1>
                <p class="text-secondary mb-4">Entre para acessar as funcionalidades administrativas.</p>

                <form method="post" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuario</label>
                        <input class="form-control" id="username" name="username" type="text" autocomplete="username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Senha</label>
                        <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
